name: CI/CD -- Restaurant API

permissions:
  contents: read

# ── TRIGGERS -- Quand ce pipeline se déclenche ──────────────────────
on:
  push:
    branches:
      - main      # Déploiement staging automatique
      - develop   # Build + test uniquement (pas de déploiement)
    tags:
      - 'v*.*.*'  # Ex: v1.2.3 → déclenchera le déploiement production
  pull_request:
    branches:
      - main      # Validation avant merge
      - develop

# ── VARIABLES GLOBALES ──────────────────────────────────────────────
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/restaurant-api

# ════════════════════════════════════════════════════════════════════
# JOB 1 -- BUILD AND TEST
# ════════════════════════════════════════════════════════════════════
jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installer .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Mettre en cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restaurer les dépendances
        run: dotnet restore

      - name: Compiler le projet
        run: dotnet build --no-restore --configuration Release

      - name: Exécuter les tests
        run: dotnet test --no-build --configuration Release --verbosity normal
